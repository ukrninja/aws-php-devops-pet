services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    image: ukrninja/aws-php-devops-pet:latest
    container_name: app
    restart: always
    env_file: .env
    depends_on:
      - db
  

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  db_data:
